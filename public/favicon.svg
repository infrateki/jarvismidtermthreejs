<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Chrome metallic — diagonal sweep with multiple highlight bands -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7BA8D4"/>
      <stop offset="10%"  stop-color="#C8E0FF"/>
      <stop offset="22%"  stop-color="#3A68A8"/>
      <stop offset="38%"  stop-color="#E8F6FF"/>
      <stop offset="52%"  stop-color="#2050A0"/>
      <stop offset="65%"  stop-color="#B0CCEC"/>
      <stop offset="80%"  stop-color="#4880C0"/>
      <stop offset="100%" stop-color="#8ABCE0"/>
    </linearGradient>

    <!-- Reverse chrome for the stem (more variation = more depth) -->
    <linearGradient id="chrome2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#B8D8FF"/>
      <stop offset="18%"  stop-color="#2A5898"/>
      <stop offset="42%"  stop-color="#D8EEFF"/>
      <stop offset="68%"  stop-color="#3870B8"/>
      <stop offset="100%" stop-color="#90BCE8"/>
    </linearGradient>

    <!-- Chrome for the curve arc -->
    <linearGradient id="chrome3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5090C8"/>
      <stop offset="20%"  stop-color="#D0E8FF"/>
      <stop offset="45%"  stop-color="#2860A8"/>
      <stop offset="70%"  stop-color="#E0F0FF"/>
      <stop offset="100%" stop-color="#6098D0"/>
    </linearGradient>

    <!-- Deep space background -->
    <radialGradient id="bg" cx="40%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#0C1628"/>
      <stop offset="60%"  stop-color="#080E1E"/>
      <stop offset="100%" stop-color="#060A18"/>
    </radialGradient>

    <!-- Cyan inner halo behind J -->
    <radialGradient id="cyanHalo" cx="55%" cy="52%" r="48%">
      <stop offset="0%"   stop-color="#00F0FF" stop-opacity="0.22"/>
      <stop offset="70%"  stop-color="#00B4D8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Border chrome gradient -->
    <linearGradient id="borderChrome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#90B8E0" stop-opacity="0.9"/>
      <stop offset="25%"  stop-color="#D8EEFF" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#3060A0" stop-opacity="0.7"/>
      <stop offset="75%"  stop-color="#C0D8F8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5888C0" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Cyan glow filter (double-layer for bloom) -->
    <filter id="cyanGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"  result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer card shadow + cyan edge glow -->
    <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6"  stdDeviation="18" flood-color="#00F0FF" flood-opacity="0.40"/>
      <feDropShadow dx="0" dy="0"  stdDeviation="50" flood-color="#0055FF" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000820" flood-opacity="0.80"/>
    </filter>

    <!-- Specular shimmer filter -->
    <filter id="shimmer">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to rounded square -->
    <clipPath id="card">
      <rect width="512" height="512" rx="90"/>
    </clipPath>
  </defs>

  <!-- ── CARD BASE ───────────────────────────────────────── -->
  <rect width="512" height="512" rx="90" fill="url(#bg)" filter="url(#cardShadow)"/>

  <!-- Clipped interior content -->
  <g clip-path="url(#card)">

    <!-- Subtle top-left ambient light wash -->
    <ellipse cx="190" cy="155" rx="260" ry="200" fill="rgba(40,100,200,0.06)"/>

    <!-- Cyan halo centered behind J -->
    <ellipse cx="260" cy="275" rx="200" ry="210" fill="url(#cyanHalo)"/>

    <!-- ── PARTICLES + CONNECTIONS ─────────────────────── -->
    <circle cx="72"  cy="90"  r="4"   fill="#00F0FF" opacity="0.50"/>
    <circle cx="440" cy="72"  r="3"   fill="#00F0FF" opacity="0.35"/>
    <circle cx="55"  cy="395" r="3.5" fill="#FFB547" opacity="0.45"/>
    <circle cx="452" cy="420" r="2.5" fill="#00F0FF" opacity="0.38"/>
    <circle cx="158" cy="50"  r="2.5" fill="#00F0FF" opacity="0.28"/>
    <circle cx="375" cy="460" r="3"   fill="#00F0FF" opacity="0.32"/>
    <circle cx="115" cy="455" r="2"   fill="#FFB547" opacity="0.22"/>
    <circle cx="466" cy="195" r="2.5" fill="#00F0FF" opacity="0.28"/>
    <circle cx="400" cy="130" r="2"   fill="#00F0FF" opacity="0.20"/>
    <circle cx="88"  cy="315" r="2"   fill="#00B4D8" opacity="0.25"/>

    <line x1="72"  y1="90"  x2="158" y2="50"  stroke="#00F0FF" stroke-width="1" opacity="0.14"/>
    <line x1="440" y1="72"  x2="466" y2="195" stroke="#00F0FF" stroke-width="1" opacity="0.11"/>
    <line x1="440" y1="72"  x2="400" y2="130" stroke="#00F0FF" stroke-width="1" opacity="0.09"/>
    <line x1="55"  y1="395" x2="115" y2="455" stroke="#FFB547" stroke-width="1" opacity="0.12"/>
    <line x1="375" y1="460" x2="452" y2="420" stroke="#00F0FF" stroke-width="1" opacity="0.10"/>
    <line x1="88"  y1="315" x2="55"  y2="395" stroke="#00B4D8" stroke-width="1" opacity="0.10"/>

    <!-- ── CHROME BORDER ──────────────────────────────── -->
    <rect x="11" y="11" width="490" height="490" rx="82"
          fill="none" stroke="url(#borderChrome)" stroke-width="13"/>
    <!-- Inner edge hairline -->
    <rect x="22" y="22" width="468" height="468" rx="73"
          fill="none" stroke="rgba(200,230,255,0.10)" stroke-width="1.5"/>

    <!-- ── LETTER J ────────────────────────────────────── -->

    <!-- Cyan bloom backdrop (behind chrome) -->
    <g opacity="0.30" filter="url(#cyanGlow)">
      <rect x="200" y="100" width="100" height="272" rx="16" fill="#00F0FF"/>
      <rect x="168" y="100" width="176" height="64"  rx="16" fill="#00F0FF"/>
      <path d="M 256 334 Q 258 424 188 424 Q 120 424 116 355 L 116 328"
            stroke="#00F0FF" stroke-width="84" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- J: top bar (chrome) -->
    <rect x="168" y="100" width="176" height="64" rx="16" fill="url(#chrome)"/>

    <!-- J: vertical stem (chrome2 for variation) -->
    <rect x="200" y="100" width="100" height="272" rx="16" fill="url(#chrome2)"/>

    <!-- J: bottom curve — two overlapping strokes for fat chrome arc -->
    <path d="M 256 334 Q 258 424 188 424 Q 120 424 116 355 L 116 328"
          stroke="url(#chrome3)" stroke-width="82" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 256 334 Q 258 424 188 424 Q 120 424 116 355 L 116 328"
          stroke="url(#chrome)"  stroke-width="76" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- ── SPECULAR HIGHLIGHTS ────────────────────────── -->
    <!-- Primary catch light on stem (left-top) -->
    <rect x="216" y="118" width="26" height="100" rx="9"
          fill="rgba(255,255,255,0.42)" filter="url(#shimmer)"/>
    <!-- Secondary soft sheen on stem (right) -->
    <rect x="272" y="140" width="12" height="60" rx="5"
          fill="rgba(255,255,255,0.14)"/>
    <!-- Catch light on top bar -->
    <rect x="186" y="110" width="140" height="18" rx="7"
          fill="rgba(255,255,255,0.28)"/>
    <rect x="186" y="110" width="60" height="10"  rx="5"
          fill="rgba(255,255,255,0.18)"/>
    <!-- Curve catch light (outer arc) -->
    <path d="M 134 358 Q 128 396 162 418"
          stroke="rgba(255,255,255,0.32)" stroke-width="7" fill="none"
          stroke-linecap="round"/>
    <!-- Curve inner shadow line -->
    <path d="M 148 355 Q 144 390 174 412"
          stroke="rgba(0,0,0,0.25)" stroke-width="5" fill="none"
          stroke-linecap="round"/>

    <!-- ── POWER INDICATOR (bottom-right) ─────────────── -->
    <!-- Glow ring -->
    <circle cx="382" cy="400" r="20" fill="#00F0FF" opacity="0.12"/>
    <circle cx="382" cy="400" r="14" fill="#060A18"/>
    <circle cx="382" cy="400" r="10" fill="#00F0FF" opacity="0.90"/>
    <!-- Inner specular dot -->
    <circle cx="379" cy="397" r="3.5" fill="white" opacity="0.75"/>
  </g>
</svg>
